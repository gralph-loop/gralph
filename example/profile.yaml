# gralph example profile
# Graph: plan -> implement -> verify -(route)-> { fix -> verify | finish }

agent:
  # Non-interactive agent launch command. {{prompt}} is replaced with the
  # ralph prompt below. Here a scripted fake agent stands in for a real one
  # (e.g. ["claude", "-p", "{{prompt}}", "--dangerously-skip-permissions"]).
  command: ["bash", "test/agent.sh", "{{prompt}}"]

prompt: |
  You are running inside a gralph (ralph loop) session.
  1. Run "gralph next" to receive the gralph command you must eventually run, along with any context about it.
  2. Your job is to do whatever is necessary to be able to run that gralph command — figure out and carry out the work that running it requires. Once you've done that, run the instructed gralph command with its arguments.
  3. Whenever a gralph command's response tells you to end the session, end the session immediately.

fail_threshold: 5

commands:
  - name: plan
    guidance: |
      Decide a one-word goal for this demo project and write it down.
      RUN: ./gralph do plan --goal <your-goal>
    args:
      - name: goal
        required: true
    lua: scripts/plan.lua
    next: [implement]

  - name: implement
    # No RUN: line and no {{usage}} here -- `gralph next` auto-appends the
    # usage block generated from the args spec after the guidance.
    guidance: |
      Implement the goal "{{store "goal"}}". Produce a work report file
      at report.txt and submit its path as --report.
    args:
      - name: report
        required: true
        desc: path to the work report file
    lua: scripts/implement.lua
    next: [verify]

  - name: verify
    guidance: |
      Verify the implementation of "{{store "goal"}}" (attempt {{store "attempts"}}).
      Submit your conclusion.
      RUN: ./gralph do verify --ok yes
    args:
      - name: ok
        required: true
    lua: scripts/verify.lua
    next: [fix, finish]

  - name: fix
    # {{usage}} places the generated usage block exactly here, so nothing is
    # auto-appended after the guidance.
    guidance: |
      Fix the problems found during verification of "{{store "goal"}}".
      {{usage}}
    lua: scripts/fix.lua
    next: [verify]

  - name: finish
    guidance: |
      Write a closing summary for "{{store "goal"}}".
      RUN: ./gralph do finish --summary <one line>
    args:
      - name: summary
        required: true
    lua: scripts/finish.lua
    # no `next` -> last command: success sets cursor := DONE
