# Example: TDD loop with run-the-checker gates
#
# Graph:  spec -> implement -> verify -(route)-> { fix -> verify | release }
#
# The verify gate RUNS the project's check command and routes on its real exit
# code — the agent cannot fake a green build. release validates a semver tag.
#
# Build gralph, then from this directory:
#   ../../path/to/gralph run profile.yaml --max-iterations 12
# (agent.command points at a scripted fake agent so it runs without a model.)

agent:
  command: ["bash", "agent.sh", "{{prompt}}"]

prompt: |
  You are running inside a gralph (ralph loop) session.
  1. Run "gralph next" to receive the gralph command you must eventually run.
  2. Do whatever is needed to be able to run it, then run it with its arguments.
  3. Whenever a command's response says to end the session, end it immediately.

state_dir: .gralph-state
fail_threshold: 4

commands:
  - name: spec
    guidance: |
      Decide the feature to build for this iteration and name it (one short token).
      RUN: gralph do spec --feature <name>
    args:
      - { name: feature, required: true, desc: "short feature name" }
    lua: scripts/spec.lua
    next: [implement]

  - name: implement
    guidance: |
      Implement "{{store "feature"}}" by writing the source file(s).
      Submit the comma-separated paths you created/changed.
      RUN: gralph do implement --files src/impl.txt
    args:
      - { name: files, required: true, desc: "comma-separated paths you wrote" }
    lua: scripts/implement.lua
    next: [verify]

  - name: verify
    guidance: |
      Verify "{{store "feature"}}" (pass {{store "passes"}}). Make the check pass.
      The gate runs ./check.sh itself; you don't assert the result.
      RUN: gralph do verify
    lua: scripts/verify.lua
    next: [fix, release]

  - name: fix
    guidance: |
      The check failed. Fix the implementation of "{{store "feature"}}".
      Briefly note what you changed.
      RUN: gralph do fix --note <one short line>
    args:
      - { name: note, required: true }
    lua: scripts/fix.lua
    next: [verify]

  - name: release
    guidance: |
      The check passed. Tag the release for "{{store "feature"}}" (semver: vMAJOR.MINOR.PATCH).
      RUN: gralph do release --tag v1.0.0
    args:
      - { name: tag, required: true }
    lua: scripts/release.lua
    # no next -> terminal: success sets cursor := DONE
