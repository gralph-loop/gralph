name: release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # 전체 히스토리와 태그를 받아야 (1) 태그 커밋이 main에 있는지 검사하고
          # (2) Go 툴체인이 태그에서 모듈 버전을 스탬핑할 수 있다.
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Build all platforms
        run: bash build.sh
        env:
          VERSION: ${{ github.ref_name }}

      - name: Stamp version on asset names
        run: |
          cd dist
          # 로컬 편의용 복사본은 릴리즈 자산에서 제외한다.
          rm -f gralph gralph.exe
          # 버전이 박힌 이름과, latest/download URL을 버전 무관하게 쓸 수 있는
          # 버전 없는 별칭 이름을 둘 다 올린다.
          for f in gralph-*; do
            cp "$f" "${f/gralph-/gralph-${GITHUB_REF_NAME}-}"
          done
          ls -1 gralph-*

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: gralph ${{ github.ref_name }}
          body: |
            Automated build of ${{ github.sha }}.

            Verify a downloaded binary with `go version -m <file>` or `gralph version`.
          files: |
            dist/gralph-*
